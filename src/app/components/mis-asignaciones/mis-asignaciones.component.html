<div class="panel-card">
  <div class="panel-header">
    <div class="panel-header-title">
      <h1 class="panel-title">Mis asignaciones</h1>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <label>Buscar activo</label>
      <div class="search-input-wrap">
        <i class="pi pi-search"></i>
        <input
          type="text"
          pInputText
          appCapitalizeFirst
          [(ngModel)]="busqueda"
          (ngModelChange)="filtrar()"
          placeholder="Buscar por palabra"
        />
      </div>
    </div>
  </div>

  <p-table
    [value]="asignacionesFiltradas"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[5, 10, 20]"
    responsiveLayout="scroll"
    styleClass="panel-table"
    [tableStyle]="{ 'min-width': '50rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Activo</th>
        <th>Serial</th>
        <th>Fecha de asignación</th>
        <th>Estado</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-asignacion>
      <tr>
        <td>{{ asignacion.activo.tipo }} - {{ asignacion.activo.marca }}</td>
        <td>{{ asignacion.activo.serial }}</td>
        <td>{{ asignacion.fechaAsignacion | date:'shortDate' }}</td>
        <td>
          <span class="estado-badge" [ngClass]="asignacion.activo.estado?.toLowerCase()">
            <span class="dot"></span>
            {{ asignacion.activo.estado }}
          </span>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4">No tienes asignaciones registradas.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
